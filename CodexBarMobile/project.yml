name: CodexBarMobile
options:
  bundleIdPrefix: com.columbuslabs.quotakit
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_UPCOMING_FEATURE_STRICT_CONCURRENCY: true

schemes:
  CodexBarMobile:
    build:
      targets:
        CodexBarMobile: all
    test:
      targets:
        - name: CodexBarMobileTests
        - name: CodexBarMobileUITests
    run:
      storeKitConfiguration: StoreKit/QuotaKit.storekit

targets:
  CodexBarSync:
    type: framework
    platform: iOS
    sources:
      - path: ../Shared
        group: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.columbuslabs.quotakit.sync
        GENERATE_INFOPLIST_FILE: true
        MARKETING_VERSION: "1.11.1"
        CURRENT_PROJECT_VERSION: "162"

  CodexBarMobilePushExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: CodexBarMobilePushExtension
        excludes:
          - "**/.DS_Store"
      # iOS 1.6.0 — NSE looks up Push.QuotaWarning.* strings via
      # String(localized:), which resolves against the extension's
      # OWN bundle (not the host app). Include the main app's xcstrings
      # so the extension ships with the same translations. Same source
      # of truth — Xcode compiles a copy into each bundle.
      - path: CodexBarMobile/Localizable.xcstrings
    dependencies:
      - target: CodexBarSync
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.columbuslabs.quotakit.ios.pushextension
        MARKETING_VERSION: "1.11.1"
        CURRENT_PROJECT_VERSION: "162"
        DEVELOPMENT_TEAM: QUOTAKIT_TEAM_ID
        INFOPLIST_FILE: CodexBarMobilePushExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: CodexBarMobilePushExtension/PushExtension.entitlements
        SKIP_INSTALL: true

  CodexBarMobile:
    type: application
    platform: iOS
    sources:
      - path: CodexBarMobile
        excludes:
          - "**/.DS_Store"
      - path: StoreKit/QuotaKit.storekit
    dependencies:
      - target: CodexBarSync
      - target: CodexBarMobilePushExtension
      - target: CodexBarMobileWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.columbuslabs.quotakit.ios
        MARKETING_VERSION: "1.11.1"
        CURRENT_PROJECT_VERSION: "162"
        DEVELOPMENT_TEAM: QUOTAKIT_TEAM_ID
        INFOPLIST_FILE: CodexBarMobile/Info.plist
        CODE_SIGN_ENTITLEMENTS: CodexBarMobile/CodexBarMobile.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: true

  CodexBarMobileWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: CodexBarMobileWidgets
        excludes:
          - "**/.DS_Store"
      - path: CodexBarMobile/Widgets/QuotaKitWidgetSnapshot.swift
      - path: CodexBarMobile/Widgets/QuotaKitWidgetViews.swift
      - path: CodexBarMobile/Views/UsageProgressBarView.swift
      - path: CodexBarMobile/Models/ProviderColorPalette.swift
      - path: CodexBarMobile/Design/QuotaUsageColor.swift
      - path: CodexBarMobile/StoreKit/ProEntitlementCache.swift
      - path: CodexBarMobile/Localizable.xcstrings
    dependencies:
      - target: CodexBarSync
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.columbuslabs.quotakit.ios.widgets
        MARKETING_VERSION: "1.11.1"
        CURRENT_PROJECT_VERSION: "162"
        DEVELOPMENT_TEAM: QUOTAKIT_TEAM_ID
        INFOPLIST_FILE: CodexBarMobileWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: CodexBarMobileWidgets/QuotaKitWidgets.entitlements
        SKIP_INSTALL: true
        SWIFT_EMIT_LOC_STRINGS: true

  CodexBarMobileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CodexBarMobileTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: CodexBarMobile
      - target: CodexBarSync
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.columbuslabs.quotakit.ios.tests
        GENERATE_INFOPLIST_FILE: true

  CodexBarMobileUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CodexBarMobileUITests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: CodexBarMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.columbuslabs.quotakit.ios.uitests
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: CodexBarMobile
